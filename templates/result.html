<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Comparison Result - Advanced</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <h1>Comparison Result (Advanced)</h1>

    <div class="controls">
      {% if summary_file %}
        <a href="{{ url_for('output_file', filename=summary_file) }}">Download summary</a>
      {% endif %}
      {% if annotated_new %}
        <a href="{{ url_for('output_file', filename=annotated_new) }}">Download annotated new PDF</a>
      {% endif %}
      {% if merged_report %}
        <a href="{{ url_for('output_file', filename=merged_report) }}">Download merged report</a>
      {% endif %}
      <a href="{{ url_for('index') }}">Back</a>
    </div>

    <hr/>
    <div id="side-by-side">
      {{ side_by_side|safe }}
    </div>

    <hr/>
    <p>Changed pages: {{ changed_pages }}</p>
  </div>
</body>
</html>
