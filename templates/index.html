<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>PDF DIFF TOOL (Advanced)</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <h1>PDF_DIFF_TOOL (Advanced)</h1>
    <p>Upload old and new PDFs. This advanced version uses PyMuPDF + Tesseract OCR and creates annotated PDF + side-by-side diff.</p>

    <form action="/compare" method="post" enctype="multipart/form-data">
      <label>Old PDF:</label><br/>
      <input type="file" name="old_pdf" accept="application/pdf" required><br/><br/>
      <label>New PDF:</label><br/>
      <input type="file" name="new_pdf" accept="application/pdf" required><br/><br/>
      <button type="submit">Compare (Advanced)</button>
    </form>

    <hr/>
    <p>Notes: OCR is done with Tesseract. Building the Docker image installs the required system dependencies.</p>
  </div>
</body>
</html>
