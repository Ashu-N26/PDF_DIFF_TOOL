<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>PDF Diff Tool</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <h1>PDF DIFF TOOL</h1>
    <p class="author">Created by Ashutosh Nanaware</p>
    <form action="/compare" method="post" enctype="multipart/form-data">
      <label>Old PDF (previous)</label>
      <input type="file" name="pdf1" accept="application/pdf" required>
      <label>New PDF (latest)</label>
      <input type="file" name="pdf2" accept="application/pdf" required>
      <button type="submit">Compare</button>
    </form>
    <p>Or <a href="/sample">generate sample PDFs</a> (for quick test)</p>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul class="flashes">
        {% for m in messages %}<li>{{m}}</li>{% endfor %}
        </ul>
      {% endif %}
    {% endwith %}
  </div>
</body>
</html>
