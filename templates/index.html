<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>PDF Diff Tool</title>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>
  <div class="container">
    <h1>PDF Diff Tool</h1>
    <form id="uploadForm">
      <label>Old PDF (previous)</label><input type="file" id="oldpdf" name="oldpdf" accept="application/pdf" required/>
      <label>New PDF (latest)</label><input type="file" id="newpdf" name="newpdf" accept="application/pdf" required/>
      <button type="submit">Compare</button>
    </form>

    <div id="result" style="display:none">
      <h2>Preview — Side by side text</h2>
      <div id="pane">
        <div id="oldPanel" class="panel"><h3>Old</h3><pre id="oldText"></pre></div>
        <div id="newPanel" class="panel"><h3>New</h3><pre id="newText"></pre></div>
      </div>

      <h3>Diff details</h3>
      <div id="diffList"></div>

      <h3>Downloads</h3>
      <a id="dl_merged" href="#" target="_blank">Merged annotated PDF</a> |
      <a id="dl_side" href="#" target="_blank">Side-by-side PDF</a> |
      <a id="dl_summary" href="#" target="_blank">Summary PDF</a>
    </div>
  </div>
  <script src="/static/script.js"></script>
</body>
</html>
