<!DOCTYPE html>
<html>
<head>
    <title>PDF Diff Tool</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>PDF Comparison Tool</h1>
    <form action="/compare" method="post" enctype="multipart/form-data">
        <label>Upload Old PDF:</label>
        <input type="file" name="old_pdf" required><br><br>
        <label>Upload New PDF:</label>
        <input type="file" name="new_pdf" required><br><br>
        <button type="submit">Compare</button>
    </form>
    <footer>Created by Ashutosh Nanaware</footer>
</body>
</html>
