services:
  - type: web
    name: pdf-diff-tool
    env: docker
    plan: free          # change to 'starter' or higher if OCR needs more RAM
    branch: main
    autoDeploy: true
    healthCheckPath: /
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PORT
        value: "8000"










